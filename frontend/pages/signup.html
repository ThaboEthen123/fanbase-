<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Fanbase</title>

  <style>
    body{
      background:#0f0f0f;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .box{
      background:#1b1b1b;
      padding:30px;
      border-radius:20px;
      width:300px;
    }

    h1{
      text-align:center;
      color:#00ff99;
    }

    input{
      width:100%;
      padding:12px;
      margin-top:10px;
      border:none;
      border-radius:10px;
      background:#2b2b2b;
      color:white;
    }

    button{
      width:100%;
      padding:12px;
      margin-top:20px;
      border:none;
      border-radius:10px;
      background:#00ff99;
      color:black;
      font-weight:bold;
      cursor:pointer;
    }

    a{
      color:#00ff99;
      text-decoration:none;
    }

    p{
      text-align:center;
      margin-top:15px;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Fanbase</h1>

  <input type="text" placeholder="Username">

  <input type="email" placeholder="Email">

  <input type="password" placeholder="Password">

  <button>Create Account</button>

  <p>
    Already have an account?
    <a href="login.html">Login</a>
  </p>
</div>

</body>
</html>
